name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm ci || npm install
          fi

      - name: Run Lint
        run: |
          if [ -f package.json ]; then
            npm run lint --if-present
          fi

      - name: Run Tests
        run: |
          if [ -f package.json ]; then
            npm test --if-present
          fi
